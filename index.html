<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jsQuiz09 - 分割代入とmap</title>
    <style>
      body {
        padding: 0 16px;
        font-family: sans-serif;
      }

      h1 {
        letter-spacing: 0.08em;
      }

      .menu-toggle-btn {
        padding: 8px 20px;
        margin: 12px 0 20px;
        font-size: 1rem;
        cursor: pointer;
      }

      .menu-list {
        list-style: none;
        padding: 0;
        max-width: 360px;
      }

      .menu-list li {
        display: flex;
        align-items: center;
        border-bottom: 1px dashed #ccc;
        padding: 10px 4px;
        font-size: 1.05rem;
      }
    </style>
  </head>
  <body>
    <h1>TRIDENT CAFE</h1>
    <p>ボタンを押すたびに、メニューの一覧の表示/非表示が切り替わります。</p>

    <button class="menu-toggle-btn">メニューを表示</button>

    <!-- メニューはここに <li> で描画されます（最初は空） -->
    <ul class="menu-list"></ul>

    <script>
      // ===== データとボタン処理は用意済みです（書き換えないこと）=====
      // メニューのデータ（配列の配列。1品は [名前, 値段, 絵文字] の並び）
      const menu = [
        ['カフェラテ', 480, '☕'],
        ['抹茶ラテ', 520, '🍵'],
        ['ゆずソーダ', 450, '🍹'],
        ['ショートケーキ', 550, '🍰'],
        ['プリン', 400, '🍮'],
        ['タマゴサンド', 380, '🥪'],
      ];

      const list = document.querySelector('.menu-list');
      const button = document.querySelector('.menu-toggle-btn');

      // ===== ここから下があなたの課題です =====

      /* やること：renderMenu を完成させること。
         メニューの配列 items を、map で1品ずつ
         `<li>${emoji} ${name}：${price}円</li>` の形の文字列に変換し、
         join('') で1つの文字列につなげて返す関数。 */

      // 課題：renderMenu を作る
      function renderMenu(items) {
        const elements = items
          .map((item) => {
            const [name, price, emoji] = item;
            // ↓ ここを書き換える（課題）
            item.map()
            return '<li>${emoji} ${name}：${price}円</li>';
          })
          .join('');
        return elements;
      }
      // ===== ここまでがあなたの課題です =====

      // 表示するときは、renderMenu が作った HTML をリストに流し込む。
      // innerHTML ではなく setHTML を使うと、危険なタグを自動で除去（サニタイズ）してくれる。
      button.addEventListener('click', function () {
        if (list.children.length === 0) {
          list.setHTML(renderMenu(menu));
          button.textContent = 'メニューを閉じる';
        } else {
          list.setHTML('');
          button.textContent = 'メニューを表示';
        }
      });
    </script>
  </body>
</html>
